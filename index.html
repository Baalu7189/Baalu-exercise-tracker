<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Training"/>
<meta name="theme-color" content="#0B1B3F"/>
<title>Training</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0B1B3F;--navy2:#16294f;--orange:#F7681F;--orange-soft:#FFF0E8;
  --bg:#F4F5F7;--card:#fff;--text:#1A2233;--text2:#5A6478;--text3:#9AA3B5;
  --border:#E6E9EF;--border2:#D4D9E3;
  --green:#1E9E6A;--green-bg:#E4F5EE;
  --r:12px;--rl:16px;
}
@media(prefers-color-scheme:dark){
  :root{--navy:#0B1B3F;--navy2:#1d3461;--bg:#0E1322;--card:#171D2E;--text:#EDF0F6;--text2:#A2ACC0;--text3:#5E687E;--border:#252C40;--border2:#333B52;--orange-soft:#2A1A10;--green-bg:#10251C;}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding-bottom:calc(72px + env(safe-area-inset-bottom))}
.app{max-width:440px;margin:0 auto}
/* Header */
.hdr{background:var(--navy);color:#fff;padding:18px 18px 20px;border-radius:0 0 22px 22px}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hdr-top h1{font-size:19px;font-weight:700;letter-spacing:-0.3px}
.hdr-date{font-size:12px;color:rgba(255,255,255,.6)}
.progress-track{display:flex;gap:5px;margin-top:4px}
.progress-seg{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.18)}
.progress-seg.done{background:var(--orange)}
.progress-seg.cur{background:#fff}
/* Session card header */
.tab{display:none;padding:14px 16px}
.tab.on{display:block}
.session-hero{background:var(--card);border-radius:var(--rl);overflow:hidden;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.session-hero-tab{display:flex;align-items:center;gap:0}
.hero-flag{padding:12px 20px 12px 18px;font-size:15px;font-weight:700;color:#fff;position:relative}
.hero-flag.runna{background:var(--orange)}
.hero-flag.weights{background:var(--navy)}
.hero-flag::after{content:'';position:absolute;right:-14px;top:0;bottom:0;width:28px;background:inherit;transform:skewX(-18deg);border-radius:0 6px 6px 0}
.hero-repeat{margin-left:auto;margin-right:14px;background:rgba(0,0,0,.06);color:var(--text2);font-size:11px;font-weight:700;padding:5px 11px;border-radius:14px;z-index:1}
.hero-body{padding:14px 16px}
.hero-sub{font-size:13px;color:var(--text2);margin-bottom:4px}
.hero-change{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--orange);font-weight:600;border:1px solid var(--orange);border-radius:16px;padding:5px 12px;cursor:pointer;margin-top:6px}
/* Toggle Exercises/Log */
.seg-toggle{display:flex;background:var(--bg);border-radius:24px;padding:4px;margin-bottom:16px}
.seg-toggle button{flex:1;padding:9px;border:none;background:none;font-size:14px;font-weight:600;color:var(--text2);border-radius:20px;cursor:pointer}
.seg-toggle button.on{background:var(--navy);color:#fff}
/* Block (superset group) */
.block{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:12px;overflow:hidden}
.block-hdr{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--bg);border-bottom:1px solid var(--border)}
.block-title{font-size:13px;font-weight:700;color:var(--text)}
.block-badge{font-size:10px;font-weight:700;color:var(--orange);background:var(--orange-soft);padding:3px 9px;border-radius:12px;letter-spacing:.04em}
.set-card{padding:12px 14px;border-bottom:1px solid var(--border)}
.set-card:last-child{border-bottom:none}
.set-card.active{background:var(--orange-soft);border-left:3px solid var(--orange)}
.set-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.set-num{font-size:13px;font-weight:700}
.set-status{font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px}
.set-status.active{background:var(--orange);color:#fff}
.set-status.done{background:var(--green-bg);color:var(--green)}
/* Exercise row in set */
.exrow{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;padding:7px 0}
.exrow + .exrow{border-top:1px dashed var(--border)}
.exrow-name{font-size:13px;font-weight:500;line-height:1.3}
.mini-input{width:62px}
.mini-input label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:2px;text-align:center}
.mini-input input{width:100%;padding:7px 4px;font-size:14px;text-align:center;border:1px solid var(--border2);border-radius:8px;background:var(--card);color:var(--text);outline:none;-webkit-appearance:none}
.mini-input input:focus{border-color:var(--orange)}
.mini-input .prev{font-size:9px;color:var(--text3);text-align:center;margin-top:2px;height:11px}
.mini-input .prev b{color:var(--orange);font-weight:600}
.check{width:26px;height:26px;border:2px solid var(--border2);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.check.on{background:var(--green);border-color:var(--green)}
.check.on::after{content:'';width:6px;height:11px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
.col-head{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;padding:0 0 6px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.col-head .ch-name{text-align:left}
.col-head .ch-mini{width:62px;text-align:center}
.col-head .ch-chk{width:26px}
.rest-row{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;color:var(--navy);font-size:13px;font-weight:600;background:var(--bg);border-top:1px solid var(--border)}
/* Exercises view (read-only list) */
.exlist-block{margin-bottom:14px}
.exlist-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.exlist-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:6px;font-size:14px;font-weight:500}
/* Save bar */
.save-bar{margin-top:4px}
.btn{width:100%;padding:14px;font-size:15px;font-weight:700;border-radius:var(--r);border:none;cursor:pointer}
.btn:active{transform:scale(.99)}
.btn-navy{background:var(--navy);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border2)}
.btn-row{display:flex;gap:10px;margin-top:10px}
/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:50}
.nav button{flex:1;padding:11px 4px 9px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.nav button.on{color:var(--orange)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:22px 22px 0 0;padding:20px 16px 30px;width:100%;max-width:440px;margin:0 auto;max-height:80vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:16px}
.sess-opt{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer}
.sess-opt.on{border-color:var(--orange);background:var(--orange-soft)}
.sess-opt-l{display:flex;flex-direction:column;gap:2px}
.sess-opt-title{font-size:14px;font-weight:600}
.sess-opt-sub{font-size:11px;color:var(--text2)}
.sess-opt-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px}
.sess-opt-tag.runna{background:var(--orange-soft);color:var(--orange)}
.sess-opt-tag.weights{background:rgba(11,27,63,.08);color:var(--navy)}
.filter-row{display:flex;gap:6px;margin-bottom:14px}
.filter-row button{flex:1;padding:8px;font-size:12px;font-weight:600;border:1px solid var(--border2);border-radius:18px;background:var(--card);color:var(--text2);cursor:pointer}
.filter-row button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
/* History */
.hcard{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:13px 14px;margin-bottom:10px}
.hcard-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.hcard-name{font-size:15px;font-weight:700}
.hcard-meta{font-size:11px;color:var(--text3);margin-bottom:6px}
.hcard-set{font-size:13px;color:var(--text2);padding:2px 0}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px}
.lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;font-weight:700}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;line-height:1.6}
.home-btn{background:rgba(255,255,255,.14);border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.home-btn svg{width:19px;height:19px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.home-btn:active{background:rgba(255,255,255,.28)}
.tstart{height:34px;padding:0 14px;border-radius:9px;border:none;background:var(--green);color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-left:2px}
.tstart:active{transform:scale(.97)}
.time-ctrl.running{gap:10px}
.tstop{background:#D6453C;color:#fff;border-color:#D6453C}
.tpause{background:var(--navy);color:#fff;border-color:var(--navy);font-size:14px}
.ticking{color:var(--orange)!important;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.exrow.mode-time{grid-template-columns:1fr auto auto}
.mini-input.wide{width:90px}
.time-ctrl{display:flex;align-items:center;gap:6px}
.tstep{width:34px;height:34px;border-radius:9px;border:1px solid var(--border2);background:var(--card);color:var(--text);font-size:20px;font-weight:700;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center}
.tstep:active{background:var(--bg)}
.time-val{min-width:54px;text-align:center}
.time-val span{font-size:16px;font-weight:700;color:var(--text)}
.mode-toggle{display:inline-block;margin-left:8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--orange);background:var(--orange-soft);border-radius:8px;padding:2px 7px;cursor:pointer;vertical-align:middle}
.exrow.mode-time{grid-template-columns:1fr auto auto}
.exrow.mode-reps{grid-template-columns:1fr auto auto}
/* Run tab */
.run-hero{text-align:center;padding:24px 16px 20px}
.run-hero-icon{font-size:48px;margin-bottom:10px}
.run-hero-title{font-size:22px;font-weight:700;margin-bottom:4px}
.run-hero-sub{font-size:14px;color:var(--text2)}
.run-env-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
.run-env{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:22px 12px;cursor:pointer;text-align:center}
.run-env:active{transform:scale(.98);border-color:var(--orange)}
.run-env-ic{font-size:34px;margin-bottom:8px}
.run-env-t{font-size:16px;font-weight:700;margin-bottom:2px}
.run-env-s{font-size:11px;color:var(--text2)}
.run-live{text-align:center;padding:30px 16px}
.run-env-badge{display:inline-block;font-size:12px;font-weight:700;padding:5px 14px;border-radius:16px;margin-bottom:24px}
.run-env-badge.outdoor{background:var(--green-bg);color:var(--green)}
.run-env-badge.indoor{background:var(--orange-soft);color:var(--orange)}
.run-clock{font-size:60px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1}
.run-clock-lbl{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:6px}
.run-btn-row{display:flex;gap:10px;margin-top:30px}
.run-start-big{background:var(--green);color:#fff;font-size:17px;padding:16px}
.run-start-big:active{transform:scale(.98)}
.run-pause{background:var(--navy);color:#fff}
.run-stop{background:#D6453C;color:#fff}
.run-done-card{padding:20px 16px}
.run-done-title{font-size:20px;font-weight:700;text-align:center;margin:14px 0 4px}
.run-summary-time{font-size:44px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums}
.run-pace-box{display:flex;align-items:center;justify-content:space-between;background:var(--orange-soft);border-radius:12px;padding:14px 16px}
.run-pace-lbl{font-size:13px;font-weight:600;color:var(--orange)}
.run-pace-val{font-size:18px;font-weight:800;color:var(--orange)}
.manage-hint{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.4}
.manage-item{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;gap:8px}
.manage-item.removed{opacity:.6}
.manage-name{font-size:14px;font-weight:600;flex:1;min-width:0}
.manage-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}
.step-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:var(--card);color:var(--text);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.step-val{font-size:12px;font-weight:600;color:var(--text2);min-width:42px;text-align:center}
.rm-btn{font-size:12px;font-weight:600;color:#D6453C;background:none;border:1px solid #E7B0AC;border-radius:14px;padding:5px 10px;cursor:pointer}
.restore-btn{font-size:12px;font-weight:600;color:var(--green);background:none;border:1px solid var(--green);border-radius:14px;padding:5px 10px;cursor:pointer}
.ex-yt{color:var(--text);text-decoration:none;border-bottom:1.5px dotted var(--orange)}
.ex-yt:active{color:var(--orange)}
.yt-ic{color:var(--orange);font-size:10px;vertical-align:middle;margin-left:2px}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;border-radius:20px;padding:10px 20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <h1>My Training</h1>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="hdr-date" id="hdr-date"></span>
        <button class="home-btn" onclick="goHome()" title="Jump to current session">
          <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/><path d="M9 21v-6h6v6"/></svg>
        </button>
      </div>
    </div>
    <div class="progress-track" id="progress"></div>
  </div>

  <div class="tab on" id="tab-log"><div id="log-content"></div></div>
  <div class="tab" id="tab-run"><div id="run-content"></div></div>
  <div class="tab" id="tab-history"><div id="hist-content"></div></div>
</div>

<!-- Session picker -->
<div class="modal-overlay" id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="modal">
    <div class="modal-title">Choose a session</div>
    <div class="modal-sub">Pick any workout — do them in whatever order suits you</div>
    <div class="filter-row">
      <button class="on" id="f-all" onclick="setFilter('all')">All</button>
      <button id="f-runna" onclick="setFilter('runna')">Baalu-Runna</button>
      <button id="f-weights" onclick="setFilter('weights')">Baalu-Weights</button>
    </div>
    <div id="sess-list"></div>
  </div>
</div>

<nav class="nav">
  <button class="on" id="nav-log" onclick="showTab('log')">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Workout
  </button>
  <button id="nav-run" onclick="showTab('run')">
    <svg viewBox="0 0 24 24"><circle cx="13" cy="4" r="2"/><path d="M5 20l3-5 3 2 1-4"/><path d="M7 10l4-2 3 3 3 1"/><path d="M12 13l1 3 3 3"/></svg>Run
  </button>
  <button id="nav-history" onclick="showTab('history')">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>History
  </button>
</nav>

<div class="toast" id="toast"></div>

/* ── resolve current session into a uniform structure ──
   structure: { kind, title, subtitle, blocks:[ {sets:N, exercises:[name,...]} ] }
   weights sessions: each exercise becomes a block of {sets:4, exercises:[name]} default 4 sets
*/
function resolveSession(seqEntry){
  if(seqEntry.type==='runna'){
    const r=RS[seqEntry.idx];
    return {kind:'runna', title:r.title, subtitle:r.subtitle, blocks:r.blocks.map(b=>({sets:b.sets, exercises:b.exercises.slice()}))};
  } else {
    const w=WS[seqEntry.idx];
    const ov=wOverrides[seqEntry.idx]||{};
    const removed=ov.removed||[];
    const setCounts=ov.setCounts||{};
    const exs=w.exercises.filter(n=>removed.indexOf(n)===-1);
    return {kind:'weights', title:w.title, subtitle:w.subtitle, wIdx:seqEntry.idx,
            blocks:exs.map(n=>({sets:(setCounts[n]||4), exercises:[n]}))};
  }
}

/* build a live working session: for each block, expand into sets with empty logged values */
function buildLiveSession(){
  const sess=resolveSession(SEQ[curSeqIdx]);
  liveSession={kind:sess.kind, title:sess.title, subtitle:sess.subtitle, wIdx:sess.wIdx, blocks:[]};
  sess.blocks.forEach(b=>{
    const sets=[];
    for(let s=0;s<b.sets;s++){
      sets.push(b.exercises.map(name=>{
        const m=exMode(name, sess.kind);
        return {name, reps:'', weight:'', secs:(m==='time'?defaultDur(name):''), done:false};
      }));
    }
    liveSession.blocks.push({sets, exercises:b.exercises.slice()});
  });
}

/* find previous logged values for an exercise (most recent entry) */
function prevFor(name){
  for(const e of entries){
    if(e.flatSets){
      for(const fs of e.flatSets){
        if(fs.name===name && (fs.reps||fs.weight||fs.secs)) return fs;
      }
    }
  }
  return null;
}

/* ── progress bar (shows position in alternating sequence, current + neighbours) ── */
function renderProgress(){
  const el=document.getElementById('progress');
  const total=5;
  const start=Math.max(0, curSeqIdx-2);
  let html='';
  for(let i=0;i<total;i++){
    const idx=start+i;
    let cls='progress-seg';
    if(idx<curSeqIdx) cls+=' done';
    else if(idx===curSeqIdx) cls+=' cur';
    html+=`<div class="${cls}"></div>`;
  }
  el.innerHTML=html;
}

/* ── tabs ── */
function showTab(t){
  ['log','run','history'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('on',x===t);
    document.getElementById('nav-'+x).classList.toggle('on',x===t);
  });
  if(t==='history') renderHist();
  if(t==='log') renderLog();
  if(t==='run') renderRun();
}

    <button class="${view==='log'?'on':''}" onclick="setView('log')">Log</button>`;
  if(s.kind==='weights') html+=`<button class="${view==='manage'?'on':''}" onclick="setView('manage')">Manage</button>`;
  html+=`</div>`;

  if(view==='manage' && s.kind==='weights'){
    renderManage(s);
    return;
  }
  if(view==='exercises'){
    /* read-only list grouped by block */
    s.blocks.forEach((b,bi)=>{
      const isSuper=b.exercises.length>1;
      html+=`<div class="exlist-block">
        <div class="exlist-title">${b.sets.length} set${b.sets.length>1?'s':''}${isSuper?' \u00b7 superset':''}</div>`;
      b.exercises.forEach(n=>{ const lk=(s.kind==='runna')?`<span class="ex-yt" onclick="openVid('${runnaLink(n).replace(/'/g,"\\'")}')">${n} <span class="yt-ic">\u25b6</span></span>`:n; html+=`<div class="exlist-item">${lk}</div>`; });
      html+=`</div>`;
    });
  } else {
    /* LOG view: each block, each set with input rows */
    s.blocks.forEach((b,bi)=>{
      const isSuper=b.exercises.length>1;
      html+=`<div class="block">
        <div class="block-hdr">
          <span class="block-title">${b.exercises.length>1?'Superset':b.exercises[0]}</span>
          <span class="block-badge">${b.sets.length} SET${b.sets.length>1?'S':''}</span>
        </div>`;

      b.sets.forEach((setExs,si)=>{
        const allDone=setExs.every(x=>x.done);
        html+=`<div class="set-card${allDone?'':''}">
          <div class="set-card-top">
            <span class="set-num">Set ${si+1}</span>
            ${allDone?'<span class="set-status done">DONE</span>':''}
          </div>`;
        setExs.forEach((x,xi)=>{
          const mode=exMode(x.name, s.kind);
          const prev=prevFor(x.name);
          const exLink = (s.kind==='runna') ? `<span class="ex-yt" onclick="event.stopPropagation();openVid('${runnaLink(x.name).replace(/'/g,"\\'")}')">${x.name} <span class="yt-ic">\u25b6</span></span>` : x.name;
          const modeLabel = mode==='weight'?'kg':(mode==='time'?'time':'reps');
          let fields='';
          if(mode==='weight'){
            fields=`<div class="mini-input"><label>Reps</label><input type="number" inputmode="numeric" value="${x.reps}" placeholder="-" oninput="upd(${bi},${si},${xi},'reps',this.value)"><div class="prev">${prev&&prev.reps?'prev '+prev.reps:''}</div></div>
            <div class="mini-input"><label>kg</label><input type="number" inputmode="decimal" step="0.5" value="${x.weight}" placeholder="-" oninput="upd(${bi},${si},${xi},'weight',this.value)"><div class="prev">${prev&&prev.weight?'prev '+prev.weight:''}</div></div>`;
          } else if(mode==='reps'){
            fields=`<div class="mini-input wide"><label>Reps</label><input type="number" inputmode="numeric" value="${x.reps}" placeholder="-" oninput="upd(${bi},${si},${xi},'reps',this.value)"><div class="prev">${prev&&prev.reps?'prev '+prev.reps:''}</div></div>`;
          } else {
            const running = activeTimer && activeTimer.bi===bi && activeTimer.si===si && activeTimer.xi===xi;
            const shown = running ? activeTimer.remaining : (x.secs!==''&&x.secs!=null?parseInt(x.secs):defaultDur(x.name));
            if(running){
              fields=`<div class="time-ctrl running">
                <button class="tstep tstop" onclick="event.stopPropagation();stopTimer()">\u25a0</button>
                <div class="time-val"><span class="ticking" id="tick-${bi}-${si}-${xi}">${fmtSecs(shown)}</span></div>
                <button class="tstep tpause" onclick="event.stopPropagation();pauseTimer()">${activeTimer.paused?'\u25b6':'\u2225'}</button>
              </div>`;
            } else {
              fields=`<div class="time-ctrl">
                <button class="tstep" onclick="event.stopPropagation();bumpSecs(${bi},${si},${xi},-15)">\u2212</button>
                <div class="time-val"><span>${fmtSecs(shown)}</span><div class="prev">${prev&&prev.secs?'prev '+fmtSecs(prev.secs):''}</div></div>
                <button class="tstep" onclick="event.stopPropagation();bumpSecs(${bi},${si},${xi},15)">+</button>
                <button class="tstart" onclick="event.stopPropagation();startTimer(${bi},${si},${xi})">Start</button>
              </div>`;
            }
          }
          html+=`<div class="exrow mode-${mode}">
            <div class="exrow-name">${exLink}<span class="mode-toggle" onclick="cycleMode('${x.name.replace(/'/g,"\\'")}','${s.kind}')">${modeLabel}</span></div>
            ${fields}
            <div class="check ${x.done?'on':''}" onclick="toggleDone(${bi},${si},${xi})"></div>
          </div>`;
        });
        html+=`</div>`;
      });
      html+=`</div>`;
    });

    /* save / next */
    html+=`<div class="save-bar">
      <button class="btn btn-navy" onclick="finishSession()">Save workout</button>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="prevSession()">\u2039 Previous</button>
        <button class="btn btn-orange" onclick="nextSession()">Next session \u203a</button>
      </div>
    </div>`;
  }

  el.innerHTML=html;
}

function setView(v){ view=v; renderLog(); }

function renderManage(s){
  const el=document.getElementById('log-content');
  const wIdx=s.wIdx;
  let html='';
  // re-render hero + toggle (reuse simple header)
  html+=`<div class="session-hero">
    <div class="session-hero-tab">
      <div class="hero-flag weights">Baalu-Weights</div>
      <span class="hero-repeat">Session ${curSeqIdx+1}</span>
    </div>
    <div class="hero-body">
      <div style="font-size:17px;font-weight:700;margin-bottom:2px">${s.title}</div>
      <div class="hero-sub">${s.subtitle}</div>
      <span class="hero-change" onclick="openModal()">\u21c4 Change session</span>
    </div>
  </div>`;
  html+=`<div class="seg-toggle">
    <button onclick="setView('exercises')">Exercises</button>
    <button onclick="setView('log')">Log</button>
    <button class="on" onclick="setView('manage')">Manage</button>
  </div>`;
  html+=`<p class="manage-hint">Remove exercises you don't want, or change the number of sets. Changes apply to this session and are saved.</p>`;

  s.blocks.forEach((b,bi)=>{
    const name=b.exercises[0];
    html+=`<div class="manage-item">
      <div class="manage-name">${name}</div>
      <div class="manage-ctrl">
        <button class="step-btn" onclick="changeSets(${wIdx},'${name.replace(/'/g,"\\'")}',-1)">\u2212</button>
        <span class="step-val">${b.sets.length} set${b.sets.length>1?'s':''}</span>
        <button class="step-btn" onclick="changeSets(${wIdx},'${name.replace(/'/g,"\\'")}',1)">+</button>
        <button class="rm-btn" onclick="removeWeightEx(${wIdx},'${name.replace(/'/g,"\\'")}')">Remove</button>
      </div>
    </div>`;
  });

  if(wOverrides[wIdx] && (wOverrides[wIdx].removed||[]).length){
    html+=`<p class="lbl">Removed</p>`;
    wOverrides[wIdx].removed.forEach(n=>{
      html+=`<div class="manage-item removed">
        <div class="manage-name">${n}</div>
        <button class="restore-btn" onclick="restoreWeightEx(${wIdx},'${n.replace(/'/g,"\\'")}')">Restore</button>
      </div>`;
    });
  }

  html+=`<button class="btn btn-ghost" style="margin-top:14px" onclick="resetWeightSession(${wIdx})">Reset this session to original</button>`;
  el.innerHTML=html;
}

function ensureOv(wIdx){
  if(!wOverrides[wIdx]) wOverrides[wIdx]={removed:[],setCounts:{}};
  if(!wOverrides[wIdx].removed) wOverrides[wIdx].removed=[];
  if(!wOverrides[wIdx].setCounts) wOverrides[wIdx].setCounts={};
  return wOverrides[wIdx];
}

function changeSets(wIdx,name,delta){
  const ov=ensureOv(wIdx);
  const cur=ov.setCounts[name]||4;
  const next=Math.min(Math.max(cur+delta,1),10);
  ov.setCounts[name]=next;
  saveOverrides();
  buildLiveSession();
  renderLog();
}

function removeWeightEx(wIdx,name){
  const ov=ensureOv(wIdx);
  if(ov.removed.indexOf(name)===-1) ov.removed.push(name);
  saveOverrides();
  buildLiveSession();
  renderLog();
  toast(name+' removed');
}

function restoreWeightEx(wIdx,name){
  const ov=ensureOv(wIdx);
  ov.removed=ov.removed.filter(n=>n!==name);
  saveOverrides();
  buildLiveSession();
  renderLog();
}

function resetWeightSession(wIdx){
  delete wOverrides[wIdx];
  saveOverrides();
  buildLiveSession();
  renderLog();
  toast('Session reset to original');
}



function fmtSecs(s){ s=parseInt(s)||0; const m=Math.floor(s/60), ss=s%60; return m+':'+(ss<10?'0':'')+ss; }
function bumpSecs(bi,si,xi,delta){
  const cell=liveSession.blocks[bi].sets[si][xi];
  let cur=parseInt(cell.secs)||defaultDur(cell.name);
  cur=Math.max(5, Math.min(cur+delta, 3600));
  cell.secs=cur;
  exDurations[cell.name]=cur; saveDurations();   // remember for this exercise
  renderLog();
}

/* ── Countdown timer engine ── */
function beep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(0.001,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.4,ctx.currentTime+0.02);
    o.start();
    // three short beeps
    let t=ctx.currentTime;
    [0,0.25,0.5].forEach(off=>{
      g.gain.setValueAtTime(0.4,t+off);
      g.gain.exponentialRampToValueAtTime(0.001,t+off+0.18);
    });
    o.stop(ctx.currentTime+0.8);
  }catch(e){}
}
function buzz(){ try{ if(navigator.vibrate) navigator.vibrate([200,100,200]); }catch(e){} }

function startTimer(bi,si,xi){
  if(activeTimer) stopTimer(true);
  const cell=liveSession.blocks[bi].sets[si][xi];
  const total=parseInt(cell.secs)||defaultDur(cell.name);
  activeTimer={bi,si,xi,total,remaining:total,paused:false,intervalId:null};
  // remember chosen duration
  exDurations[cell.name]=total; saveDurations();
  activeTimer.intervalId=setInterval(tickTimer,1000);
  renderLog();
}
function tickTimer(){
  if(!activeTimer||activeTimer.paused) return;
  activeTimer.remaining--;
  const el=document.getElementById('tick-'+activeTimer.bi+'-'+activeTimer.si+'-'+activeTimer.xi);
  if(el) el.textContent=fmtSecs(Math.max(activeTimer.remaining,0));
  if(activeTimer.remaining<=0){
    finishTimer();
  }
}
function finishTimer(){
  const {bi,si,xi}=activeTimer;
  clearInterval(activeTimer.intervalId);
  beep(); buzz();
  // auto-tick the set done + record the time
  const cell=liveSession.blocks[bi].sets[si][xi];
  cell.done=true;
  cell.secs=activeTimer.total;
  activeTimer=null;
  renderLog();
  toast('Time! '+cell.name+' done');
}
function pauseTimer(){
  if(!activeTimer) return;
  activeTimer.paused=!activeTimer.paused;
  renderLog();
}
function stopTimer(silent){
  if(!activeTimer) return;
  clearInterval(activeTimer.intervalId);
  activeTimer=null;
  if(!silent) renderLog();
}
function cycleMode(name, kind){
  const order=['weight','reps','time'];
  const cur=exMode(name, kind);
  const next=order[(order.indexOf(cur)+1)%3];
  setExMode(name, next);
  toast(name+' \u2192 '+(next==='weight'?'reps + kg':next==='reps'?'reps only':'timed'));
}

function upd(bi,si,xi,field,val){
  liveSession.blocks[bi].sets[si][xi][field]=val;
}

function toggleDone(bi,si,xi){
  const cell=liveSession.blocks[bi].sets[si][xi];
  cell.done=!cell.done;
  renderLog();
}

function finishSession(){
  /* flatten all logged sets into entry */
  const flat=[];
  liveSession.blocks.forEach(b=>{
    b.sets.forEach((setExs,si)=>{
      setExs.forEach(x=>{
        if(x.reps||x.weight||x.secs||x.done){
          flat.push({name:x.name, set:si+1, reps:x.reps?parseFloat(x.reps):null, weight:x.weight?parseFloat(x.weight):null, secs:(x.secs!==''&&x.secs!=null)?parseInt(x.secs):null});
        }
      });
    });
  });
  if(!flat.length){ toast('Log at least one set first'); return; }
  entries.unshift({
    id:Date.now(),
    title:liveSession.title,
    kind:liveSession.kind,
    subtitle:liveSession.subtitle,
    date:new Date().toISOString(),
    flatSets:flat
  });
  saveEntries();
  homeIdx=curSeqIdx; saveHome();
  toast('Workout saved \u2713');
}

function goHome(){ if(activeTimer) stopTimer(true);
  curSeqIdx=homeIdx; saveSeq(); buildLiveSession(); renderProgress(); view='log'; renderLog(); window.scrollTo(0,0);
  toast('Back to your current session');
}
function nextSession(){ if(activeTimer) stopTimer(true);
  if(curSeqIdx<SEQ.length-1){ curSeqIdx++; saveSeq(); buildLiveSession(); renderProgress(); renderLog(); window.scrollTo(0,0); }
  else toast('That was the last session!');
}
function prevSession(){ if(activeTimer) stopTimer(true);
  if(curSeqIdx>0){ curSeqIdx--; saveSeq(); buildLiveSession(); renderProgress(); renderLog(); window.scrollTo(0,0); }
  else toast('Already at the first session');
}

/* ── session picker modal ── */
function openModal(){ modalFilter='all'; setFilter('all'); document.getElementById('modal').classList.add('show'); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

}

/* ── history ── */
function fmtDate(iso){ return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function delEntry(id){ entries=entries.filter(e=>e.id!==id); saveEntries(); renderHist(); }

function renderHist(){
  const el=document.getElementById('hist-content');
  if(!entries.length){ el.innerHTML='<div class="empty">No workouts logged yet.<br>Your saved sessions will appear here.</div>'; return; }
  const grouped={};
  entries.forEach(e=>{ const d=fmtDate(e.date); (grouped[d]=grouped[d]||[]).push(e); });
  el.innerHTML=Object.keys(grouped).map(date=>`
    <p class="lbl">${date}</p>
    ${grouped[date].map(e=>{
      if(e.kind==='run'){
        const paceTxt = e.paceSec ? (Math.floor(e.paceSec/60)+':'+((e.paceSec%60)<10?'0':'')+(e.paceSec%60)+' /km') : '';
        const parts=[];
        if(e.distance) parts.push(e.distance+' km');
        parts.push(fmtClock(e.runSecs||0));
        if(paceTxt) parts.push(paceTxt);
        return `<div class="hcard">
          <div class="hcard-hdr">
            <div><div class="hcard-name">${e.env==='outdoor'?'\u{1F30D}':'\u{1F3E0}'} ${e.title}</div></div>
            <button class="del-btn" onclick="delEntry(${e.id})">\u00d7</button>
          </div>
          <div class="hcard-meta">Run \u00b7 ${e.env==='outdoor'?'Outdoor':'Treadmill'}</div>
          <div class="hcard-set"><b>${parts.join('  \u00b7  ')}</b></div>
          ${e.notes?`<div class="hcard-set" style="color:var(--text3)">${e.notes}</div>`:''}
        </div>`;
      }
      // group flatSets by exercise name
      const byName={};
      (e.flatSets||[]).forEach(fs=>{ (byName[fs.name]=byName[fs.name]||[]).push(fs); });
      const body=Object.keys(byName).map(n=>{
        const sets=byName[n].map(fs=>{
          if(fs.secs!=null&&fs.secs!=='') return fmtSecs(fs.secs);
          let d=fs.reps?fs.reps+' reps':'';
          if(fs.weight) d=fs.weight+'kg \u00d7 '+(fs.reps||'?');
          return d;
        }).filter(Boolean);
        return `<div class="hcard-set"><b>${n}</b>: ${sets.join(', ')||'logged'}</div>`;
      }).join('');
      return `<div class="hcard">
        <div class="hcard-hdr">
          <div><div class="hcard-name">${e.title}</div></div>
          <button class="del-btn" onclick="delEntry(${e.id})">\u00d7</button>
        </div>
        <div class="hcard-meta">${e.kind==='runna'?'Baalu-Runna':'Baalu-Weights'} \u00b7 ${e.subtitle||''}</div>
        ${body}
      </div>`;
    }).join('')}
  `).join('');
}


/* ════════════════ RUN TAB ════════════════ */
let runState = {
  phase: 'setup',    // 'setup' | 'running' | 'done'
  env: null,         // 'indoor' | 'outdoor'
  elapsed: 0,        // seconds
  intervalId: null,
  paused: false
};

function renderRun(){
  const el=document.getElementById('run-content');
  let html='';

  if(runState.phase==='setup'){
    html+=`<div class="run-hero">
      <div class="run-hero-icon">\u{1F3C3}</div>
      <div class="run-hero-title">Go for a run</div>
      <div class="run-hero-sub">Where are you running today?</div>
    </div>`;
    html+=`<div class="run-env-grid">
      <button class="run-env" onclick="chooseEnv('outdoor')">
        <div class="run-env-ic">\u{1F30D}</div>
        <div class="run-env-t">Outdoor</div>
        <div class="run-env-s">Road, trail, park</div>
      </button>
      <button class="run-env" onclick="chooseEnv('indoor')">
        <div class="run-env-ic">\u{1F3E0}</div>
        <div class="run-env-t">Indoor</div>
        <div class="run-env-s">Treadmill</div>
      </button>
    </div>`;
  } else if(runState.phase==='ready'){
    html+=`<div class="run-live">
      <div class="run-env-badge ${runState.env}">${runState.env==='outdoor'?'\u{1F30D} Outdoor':'\u{1F3E0} Treadmill'}</div>
      <div class="run-clock">${fmtClock(0)}</div>
      <div class="run-clock-lbl">ready to start</div>
      <div class="run-btn-row">
        <button class="btn run-start-big" onclick="beginTimer()">\u25b6 Start run</button>
      </div>
      <button class="btn btn-ghost" style="margin-top:10px" onclick="discardRun()">Change location</button>
    </div>`;
  } else if(runState.phase==='running'){
    html+=`<div class="run-live">
      <div class="run-env-badge ${runState.env}">${runState.env==='outdoor'?'\u{1F30D} Outdoor':'\u{1F3E0} Treadmill'}</div>
      <div class="run-clock" id="run-clock">${fmtClock(runState.elapsed)}</div>
      <div class="run-clock-lbl">${runState.paused?'paused':'elapsed time'}</div>
      <div class="run-btn-row">
        <button class="btn run-pause" onclick="pauseRun()">${runState.paused?'\u25b6 Resume':'\u2225 Pause'}</button>
        <button class="btn run-stop" onclick="stopRun()">\u25a0 Finish</button>
      </div>
      <button class="btn btn-ghost" style="margin-top:10px" onclick="resetTimer()">\u21ba Reset</button>
    </div>`;
  } else if(runState.phase==='done'){
    html+=`<div class="run-done-card">
      <div class="run-env-badge ${runState.env}">${runState.env==='outdoor'?'\u{1F30D} Outdoor':'\u{1F3E0} Treadmill'}</div>
      <div class="run-done-title">Run complete \u{1F389}</div>
      <div class="run-summary-time">${fmtClock(runState.elapsed)}</div>
      <div class="run-clock-lbl" style="margin-bottom:18px">total time</div>
      <div class="input-wrap" style="margin-bottom:14px">
        <label>Distance (km)</label>
        <input type="number" id="run-dist" inputmode="decimal" step="0.01" placeholder="e.g. 5.2" oninput="updatePace()">
      </div>
      <div class="run-pace-box" id="run-pace-box">
        <span class="run-pace-lbl">Pace</span>
        <span class="run-pace-val" id="run-pace-val">\u2014</span>
      </div>
      <div class="input-wrap" style="margin:14px 0">
        <label>Notes (optional)</label>
        <input type="text" id="run-notes" placeholder="How did it feel?">
      </div>
      <button class="btn btn-orange" onclick="saveRun()">Save run</button>
      <button class="btn btn-ghost" style="margin-top:10px" onclick="discardRun()">Discard</button>
    </div>`;
  }
  el.innerHTML=html;
}

function fmtClock(s){
  s=parseInt(s)||0;
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), ss=s%60;
  const mm=(m<10&&h>0?'0':'')+m, sss=(ss<10?'0':'')+ss;
  return (h>0?h+':':'')+mm+':'+sss;
}

function chooseEnv(env){
  runState={phase:'ready', env, elapsed:0, intervalId:null, paused:false};
  renderRun();
}
function beginTimer(){
  runState.phase='running';
  runState.paused=false;
  if(runState.intervalId) clearInterval(runState.intervalId);
  runState.intervalId=setInterval(()=>{
    if(runState.paused) return;
    runState.elapsed++;
    const c=document.getElementById('run-clock');
    if(c) c.textContent=fmtClock(runState.elapsed);
  },1000);
  renderRun();
}
function resetTimer(){
  if(runState.intervalId) clearInterval(runState.intervalId);
  runState.elapsed=0; runState.paused=false; runState.phase='ready';
  renderRun();
}

function pauseRun(){ runState.paused=!runState.paused; renderRun(); }

function stopRun(){
  clearInterval(runState.intervalId);
  runState.phase='done';
  renderRun();
}

function updatePace(){
  const dist=parseFloat(document.getElementById('run-dist').value);
  const box=document.getElementById('run-pace-val');
  if(!dist||dist<=0||!runState.elapsed){ box.textContent='\u2014'; return; }
  const paceSecPerKm=runState.elapsed/dist;
  const m=Math.floor(paceSecPerKm/60), s=Math.round(paceSecPerKm%60);
  box.textContent=m+':'+(s<10?'0':'')+s+' /km';
}

function saveRun(){
  const dist=parseFloat(document.getElementById('run-dist').value)||null;
  const notes=document.getElementById('run-notes').value.trim();
  let pace=null;
  if(dist&&runState.elapsed){
    const p=runState.elapsed/dist; pace=Math.round(p);  // sec per km
  }
  entries.unshift({
    id:Date.now(),
    title: (runState.env==='outdoor'?'Outdoor Run':'Treadmill Run'),
    kind:'run',
    env:runState.env,
    date:new Date().toISOString(),
    runSecs:runState.elapsed,
    distance:dist,
    paceSec:pace,
    notes
  });
  saveEntries();
  toast('Run saved \u2713');
  runState={phase:'setup', env:null, elapsed:0, intervalId:null, paused:false};
  renderRun();
}

function discardRun(){
  runState={phase:'setup', env:null, elapsed:0, intervalId:null, paused:false};
  renderRun();
}

boot();
</script>
</body>
</html>
